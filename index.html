<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RadarMyDrive</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
body{font-family:-apple-system;background:linear-gradient(135deg,#0f172a,#1e3a8a,#3b82f6);color:#fff;height:100vh;margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;transition:all.3s}
body.compact{justify-content:flex-end;padding:0 0 10px 0;background:transparent}
h1{font-size:2.5rem;margin:0 0 8px}
body.compact h1,body.compact.subtitle{display:none}
.subtitle{opacity:.8;margin-bottom:40px}
.orb{width:160px;height:160px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#60a5fa,#2563eb);box-shadow:0 0 60px rgba(59,130,246,.6);margin:20px auto;display:flex;align-items:center;justify-content:center;transition:all.3s}
body.compact.orb{width:100%;height:60px;border-radius:30px;margin:0;box-shadow:0 -4px 20px rgba(0,0,0,.4)}
#micBtn{width:80px;height:80px;border-radius:50%;border:0;background:#fff;color:#1e40af;font-size:2rem;cursor:pointer;transition:all.3s}
body.compact #micBtn{width:50px;height:50px;font-size:1.5rem;margin-right:10px}
#status{margin-top:30px;font-size:1.2rem;min-height:60px}
body.compact #status{display:none}
#result{margin-top:20px;font-size:2rem;font-weight:700;min-height:40px}
body.compact #result{margin:0;font-size:1.5rem;min-height:0}
.inputs{margin-top:20px;font-size:.9rem;opacity:.7}
body.compact.inputs{display:none}
.compactBar{display:none;align-items:center;justify-content:center;width:100%}
body.compact.compactBar{display:flex}
#toggle{position:fixed;top:20px;right:20px;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:8px 12px;border-radius:20px;font-size:.8rem}
body.compact #toggle{top:auto;bottom:70px}
</style>
</head>
<body>
<button id="toggle">Mini Mode</button>
<h1>RadarMyDrive</h1>
<div class="subtitle">Voice score any delivery offer</div>
<div class="orb">
  <button id="micBtn">🎤</button>
  <div class="compactBar">
    <div id="result"></div>
  </div>
</div>
<div id="status">Tap mic and say:<br>"$8.50 payout, 3.2 miles, 18 minutes"</div>
<div class="inputs" id="inputs"></div>
<script>
const body=document.body,micBtn=document.getElementById('micBtn'),status=document.getElementById('status'),result=document.getElementById('result'),inputs=document.getElementById('inputs'),toggle=document.getElementById('toggle');
const SR=window.SpeechRecognition||window.webkitSpeechRecognition,rec=new SR();rec.lang='en-US';
const synth=window.speechSynthesis;
function speak(t){synth.speak(new SpeechSynthesisUtterance(t))}
function parse(t){return{p:parseFloat(t.match(/\$?(\d+\.?\d*)/)?.[1]),mi:parseFloat(t.match(/(\d+\.?\d*)\s*(mi|mile)/i)?.[1]),m:parseFloat(t.match(/(\d+\.?\d*)\s*(min)/i)?.[1])}}
function score(o){if(!o.p||!o.mi||!o.m)return{s:0,msg:"Missing info"};let s=50,d=o.p/o.mi,h=o.p/(o.m/60);if(d>=2.5)s+=30;else if(d>=2)s+=20;else if(d>=1.5)s+=10;else s-=10;if(h>=30)s+=20;else if(h>=25)s+=10;else if(h<18)s-=10;s=Math.max(0,Math.min(100,Math.round(s)));let v=s>=80?"Excellent. Take it.":s>=65?"Good offer. Accept.":s>=50?"Fair. Your call.":s>=35?"Low value. Decline.":"Trash tier. Skip.";return{s,msg:v,d:d.toFixed(2),h:h.toFixed(0)}}
micBtn.onclick=()=>{status.innerHTML="Listening...";result.innerHTML="";inputs.innerHTML="";rec.start()};
rec.onresult=e=>{let t=e.results[0][0].transcript,d=parse(t),r=score(d);inputs.innerHTML=`$${d.p||'?'} | ${d.mi||'?'} mi | ${d.m||'?'} min`;result.innerHTML=`${r.s}/100`;status.innerHTML=r.msg;if(r.s>0)speak(`Score ${r.s}. ${r.msg}`);else speak(r.msg)};
rec.onerror=()=>status.innerHTML="Didn't catch that. Tap mic again.";
toggle.onclick=()=>{body.classList.toggle('compact');toggle.innerHTML=body.classList.contains('compact')?'Full Mode':'Mini Mode'};
setTimeout(()=>speak("Radar My Drive ready. Tap Mini Mode to float over delivery apps."),500);
</script>
</body>
</html>
